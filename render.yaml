databases:
  - name: reroute-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: reroute-hb
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reroute-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FIVE_ELEVEN_API_KEY
        sync: false
      - key: NO_DEBUG
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.1"
