{% extends 'base.html' %}
{% block content %}

<div class="rr-card" style="max-width: 420px; margin: 40px auto;">
  <h1 class="rr-modal-title">welcome back 🚌</h1>

  <form action="/login" method="POST">
    <input type="email" name="email" placeholder="email" required class="rr-input">
    <input type="password" name="password" placeholder="password" required class="rr-input">
    <input type="submit" value="log me in" class="rr-btn rr-btn-block">
  </form>

  <p class="rr-modal-footnote">need an account? <a href="/register">sign up</a></p>
</div>

{% endblock %}
