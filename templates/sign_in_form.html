{% extends 'base.html' %}
{% block content %}

<div class="rr-card" style="max-width: 420px; margin: 40px auto;">
  <h1 class="rr-modal-title">join the squad</h1>

  <form action="/register" method="POST">
    <input type="text" name="first_name" placeholder="first name" required class="rr-input">
    <input type="text" name="last_name" placeholder="last name" required class="rr-input">
    <input type="email" name="email" placeholder="email" required class="rr-input">
    <input type="password" name="password" placeholder="choose a password" required class="rr-input">
    <input type="password" name="password2" placeholder="confirm password" required class="rr-input">
    <input type="submit" value="sign me up!" class="rr-btn rr-btn-block">
  </form>

  <p class="rr-modal-footnote">already have an account? <a href="/login">log in</a></p>
</div>

{% endblock %}
